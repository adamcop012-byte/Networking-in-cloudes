# =============================================================================
#  Nginx — API Gateway / Load Balancer
#  Simulates the PUBLIC SUBNET in the VPC:
#    - Accepts all inbound traffic (internet-facing)
#    - Routes to private-subnet services (ERP / CRM / WMS)
#    - Services are NOT directly reachable from outside — only via this gateway
#  In AWS this maps to: Application Load Balancer in Public Subnet
# =============================================================================

events {
    worker_connections 1024;
}

http {

    # ── Upstream definitions (private subnet targets) ─────────────────────────
    upstream erp_service {
        server erp:8001;
        keepalive 32;
    }

    upstream crm_service {
        server crm:8002;
        keepalive 32;
    }

    upstream wms_service {
        server wms:8003;
        keepalive 32;
    }

    # ── Rate limiting (security group equivalent) ─────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format cloud '$remote_addr [$time_local] "$request" '
                     '$status $body_bytes_sent '
                     'rt=$request_time service=$upstream_addr';

    access_log /var/log/nginx/access.log cloud;
    error_log  /var/log/nginx/error.log warn;

    # ── Main server block ─────────────────────────────────────────────────────
    server {
        listen 80;
        server_name localhost;

        # Shared proxy settings
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Gateway "nginx-public-subnet";
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;

        # ── Health check (used by Railway/Render/load balancer) ───────────────
        location /health {
            return 200 '{"gateway":"nginx","status":"ok","subnet":"public"}';
            add_header Content-Type application/json;
        }

        # ── ERP routes → private subnet ───────────────────────────────────────
        location /erp/ {
            limit_req zone=api_limit burst=50 nodelay;
            rewrite ^/erp/(.*) /$1 break;
            proxy_pass http://erp_service;
        }

        # ── CRM routes → private subnet ───────────────────────────────────────
        location /crm/ {
            limit_req zone=api_limit burst=50 nodelay;
            rewrite ^/crm/(.*) /$1 break;
            proxy_pass http://crm_service;
        }

        # ── WMS routes → private subnet ───────────────────────────────────────
        location /wms/ {
            limit_req zone=api_limit burst=50 nodelay;
            rewrite ^/wms/(.*) /$1 break;
            proxy_pass http://wms_service;
        }

        # ── Dashboard (static) ────────────────────────────────────────────────
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }
}
